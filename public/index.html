<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장기교실</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="classroom.css" />
</head>
<body>
  <div class="home">
    <header class="home-head">
      <div class="home-logo"><span class="lg-cho">楚</span><span class="lg-han">漢</span></div>
      <h1 class="home-title">장기교실</h1>
      <p class="home-sub">친구랑 두고, 배우고, 대회까지 — 우리 반 장기 놀이터</p>
    </header>

    <div class="mode-grid">
      <a class="mode-card" data-c="orange" href="together.html">
        <div class="mode-icon">🤝</div>
        <div class="mode-name">둘이서 대국</div>
        <div class="mode-desc">한 화면에서 친구랑 번갈아 두기</div>
        <div class="mode-go">시작하기 →</div>
      </a>

      <a class="mode-card" data-c="blue" href="vs-ai.html">
        <div class="mode-icon">🤖</div>
        <div class="mode-name">AI와 대국</div>
        <div class="mode-desc">컴퓨터랑 두며 급수 올리기</div>
        <div class="mode-go">시작하기 →</div>
      </a>

      <a class="mode-card" data-c="purple" href="learn.html">
        <div class="mode-icon">🎓</div>
        <div class="mode-name">배우기</div>
        <div class="mode-desc">미니게임으로 장기 규칙 익히기</div>
        <div class="mode-go">시작하기 →</div>
      </a>

      <button class="mode-card soon" data-c="green" type="button" disabled>
        <div class="mode-icon">🌐</div>
        <div class="mode-name">온라인 대전</div>
        <div class="mode-desc">멀리 있는 친구랑 실시간 대국</div>
        <div class="mode-badge">곧 만나요</div>
      </button>

      <button class="mode-card soon" data-c="red" type="button" disabled>
        <div class="mode-icon">🏆</div>
        <div class="mode-name">우리 반 대회</div>
        <div class="mode-desc">대진표 짜고 우승자 가리기</div>
        <div class="mode-badge">곧 만나요</div>
      </button>

      <a class="mode-card tool" href="advisor.html">
        <div class="mode-icon">🔎</div>
        <div class="mode-name">훈수 도우미</div>
        <div class="mode-desc">선생님용 · 추천수·복기 분석</div>
        <div class="mode-go">열기 →</div>
      </a>
    </div>

    <footer class="home-foot">장기교실 · 초등학교 교실용 장기 학습 앱</footer>
  </div>
</body>
</html>
