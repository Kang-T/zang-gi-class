<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배우기 · 장기교실</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="classroom.css" />
</head>
<body>
  <div class="cls-app">
    <div class="cls-topbar">
      <a class="topbar-back" href="index.html">← 홈</a>
      <div class="topbar-title">배우기</div>
      <div class="topbar-right"></div>
    </div>

    <!-- 학습 지도 (커리큘럼) -->
    <div id="path">
      <p class="learn-intro">장기를 처음부터 차근차근 배워요. 위에서부터 하나씩 따라와요!</p>
      <div id="path-list"></div>
    </div>

    <!-- 이야기 화면 -->
    <div id="story-view" class="hidden lesson-view">
      <div class="story-art" id="story-art"></div>
      <div class="story-title" id="story-title"></div>
      <div class="story-text" id="story-text"></div>
      <div class="story-dots" id="story-dots"></div>
      <div class="lesson-controls">
        <button id="story-prev" class="cls-btn">← 이전</button>
        <button id="story-list" class="cls-btn">☰ 목록</button>
        <button id="story-next" class="cls-btn big">다음 →</button>
      </div>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="quiz-view" class="hidden lesson-view">
      <div class="quiz-progress" id="quiz-progress"></div>
      <div class="story-art" id="quiz-art"></div>
      <div class="quiz-q" id="quiz-q"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="lesson-controls">
        <button id="quiz-list" class="cls-btn">☰ 목록</button>
        <button id="quiz-next" class="cls-btn big" disabled>다음 →</button>
      </div>
    </div>

    <!-- 판 미니게임 화면 -->
    <div id="puzzle-view" class="hidden lesson-view">
      <div class="lesson-head">
        <span id="lesson-glyph" class="lesson-glyph">車</span>
        <div id="lesson-name" class="lesson-name">차</div>
        <div id="lesson-desc" class="lesson-desc"></div>
      </div>
      <div id="task-banner" class="task-banner">—</div>
      <div class="board-wrap">
        <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="check-fx"></div>
        <div id="toast"></div>
      </div>
      <div class="lesson-controls">
        <button id="reset-btn" class="cls-btn">↺ 다시 놓기</button>
        <button id="hint-btn" class="cls-btn">💡 힌트</button>
        <button id="puzzle-next" class="cls-btn big hidden">다음 →</button>
        <button id="puzzle-list" class="cls-btn">☰ 목록</button>
      </div>
    </div>

    <!-- 단원 배지 / 축하 오버레이 -->
    <div id="badge-overlay" class="win-overlay hidden">
      <div class="win-box">
        <div id="badge-emoji" class="win-emoji">🏅</div>
        <div id="badge-title" class="win-title cho">단원 완료!</div>
        <div id="badge-sub" class="win-sub"></div>
        <div class="win-actions">
          <button id="badge-next" class="cls-btn big">다음 단원 →</button>
          <button id="badge-close" class="cls-btn ghost" type="button">학습 지도로</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="learn.js"></script>
</body>
</html>
